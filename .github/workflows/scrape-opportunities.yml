name: Scrape opportunities

on:
  schedule:
    # Daily at 01:00 UTC — refresh listings and deadlines
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scraper + backend models + Playwright
        run: |
          python -m pip install -U pip
          pip install -e ".[postgres]"
          # Scrapers import SQLAlchemy models from ../backend/app
          pip install -r ../backend/requirements.txt
          playwright install --with-deps chromium
      - name: Run automated scrapers (all fields)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # So `import app` resolves to backend/app
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -c "import app, scraper; print('imports ok')"
          # Catalogs + live scrapers across AI, sciences, social science, writing, business, etc.
          # Upserts update existing rows; maintenance deactivates past deadlines.
          python -m scraper.main --source all --max-items 80 --max-pages 5 --delay 1.0
