name: Scrape opportunities

on:
  schedule:
    # Every 3 days at 01:00 UTC
    - cron: "0 1 */3 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scraper + Playwright
        run: |
          python -m pip install -U pip
          pip install -e ".[postgres]"
          playwright install --with-deps chromium
      - name: Run scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m scraper.main --source global_competitions
          python -m scraper.main --source pathways_to_science
          python -m scraper.main --source devpost --max-items 40
