services:
  postgres:
    image: postgres:16-alpine
    container_name: opportunitymap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opportunitymap
      POSTGRES_PASSWORD: opportunitymap_dev
      POSTGRES_DB: opportunitymap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opportunitymap -d opportunitymap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
